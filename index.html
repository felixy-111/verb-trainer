<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3A5F">
<title>動詞三態闖關</title>
<style>
  :root{
    --navy:#1F3A5F; --blue:#4A7BC8; --red:#C0392B; --bg:#ECF3FB;
    --green:#27AE60; --amber:#E6A700; --gray:#B0BEC5;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif;
    background:#F4F8FD; color:#2C3E50; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .wrap{max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column;}
  header{
    background:var(--navy); color:#fff; padding:calc(12px + var(--safe-top)) 16px 12px;
    position:sticky; top:0; z-index:10;
  }
  header .row{display:flex; align-items:center; gap:10px;}
  header h1{margin:0; font-size:18px; letter-spacing:1px; flex:1;}
  header .back{
    background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:8px;
    font-size:14px; padding:8px 12px; cursor:pointer; display:none;
  }
  header .sub{font-size:12px; color:#C8D6E5; margin-top:4px;}
  .topbar{height:8px; background:#D7E2F0; border-radius:5px; overflow:hidden; margin-top:10px;}
  .topbar > div{height:100%; background:var(--green); width:0%; transition:width .4s;}
  main{flex:1; padding:14px 14px calc(20px + var(--safe-bot));}

  /* ===== 地圖 ===== */
  .maptitle{font-size:14px; color:#5a6b7d; margin:4px 2px 12px; text-align:center;}
  .regions{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .region{
    background:#fff; border-radius:16px; padding:16px 12px; text-align:center;
    box-shadow:0 3px 10px rgba(31,58,95,.10); border:2px solid #E3EBF5;
    cursor:pointer; transition:transform .08s; position:relative; min-height:120px;
    display:flex; flex-direction:column; justify-content:center; gap:6px;
  }
  .region:active{transform:scale(.97);}
  .region .lv{font-size:12px; color:var(--blue); font-weight:700; letter-spacing:1px;}
  .region .name{font-size:15px; font-weight:700; color:var(--navy);}
  .region .mini{font-size:11px; color:#8499AE;}
  .region .ring{margin:4px auto 0; width:46px; height:46px;}
  .region.locked{filter:grayscale(.8); opacity:.55; cursor:not-allowed;}
  .region.locked .lock{font-size:22px;}
  .region.done{border-color:var(--green);}
  .region.done::after{
    content:"★"; position:absolute; top:8px; right:10px; color:var(--green); font-size:16px;
  }
  .region.cur{border-color:var(--blue);}

  /* ===== 練習 ===== */
  .rprog{display:flex; align-items:center; gap:8px; margin:2px 2px 14px; font-size:12px; color:#5a6b7d;}
  .rprog .bar{flex:1; height:8px; background:#D7E2F0; border-radius:5px; overflow:hidden;}
  .rprog .bar>div{height:100%; background:var(--green); width:0%; transition:width .35s;}
  .qcard{
    background:#fff; border-radius:18px; padding:20px 16px; box-shadow:0 4px 14px rgba(31,58,95,.10);
  }
  .base{font-size:42px; font-weight:800; color:var(--navy); text-align:center; letter-spacing:1px; line-height:1.1;}
  .basecn{text-align:center; font-size:15px; color:#7a8a9c; margin-top:6px;}
  .hint{text-align:center; font-size:12px; color:#9fb2c8; margin:4px 0 14px;}
  .group{margin-top:14px;}
  .grouplbl{font-size:13px; font-weight:700; color:var(--blue); margin:0 2px 8px; display:flex; align-items:center; gap:6px;}
  .grouplbl .tag{background:#EEF4FC; color:var(--blue); border-radius:6px; padding:2px 8px; font-size:11px;}
  .grouplbl .mk{margin-left:auto; font-size:14px;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .opt{
    font-size:19px; font-weight:600; padding:15px 6px; border:2px solid #D5E0EE;
    background:#fff; border-radius:12px; cursor:pointer; color:var(--navy);
    transition:transform .06s, background .15s, border-color .15s; min-height:54px;
  }
  .opt:active{transform:scale(.96);}
  .opt.sel{border-color:var(--blue); background:#EEF4FC;}
  .opt.correct{background:#E5F6EC; border-color:var(--green); color:var(--green);}
  .opt.wrong{background:#FCE8E8; border-color:var(--red); color:var(--red);}
  .opt[disabled]{cursor:default;}
  .submit{
    margin-top:18px; width:100%; font-size:18px; font-weight:700; padding:16px; border:none;
    background:var(--navy); color:#fff; border-radius:14px; cursor:pointer; min-height:56px;
  }
  .submit:disabled{background:#B7C4D6; cursor:default;}
  .submit:active:not(:disabled){transform:scale(.98);}
  .result{margin-top:16px; text-align:center; font-size:17px; font-weight:700; min-height:24px;}
  .result.ok{color:var(--green);} .result.no{color:var(--red);}
  .result .three{display:block; font-size:16px; color:var(--navy); margin-top:8px; font-weight:600; letter-spacing:.5px;}
  .result .three small{color:#7a8a9c; font-weight:500;}

  /* ===== 本區熟悉度 ===== */
  .famtitle{font-size:12px; color:#8499AE; margin:20px 4px 8px; display:flex; justify-content:space-between;}
  .legend b{display:inline-block; width:9px; height:9px; border-radius:50%; margin:0 2px 0 8px; vertical-align:middle;}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    font-size:12px; padding:5px 9px; border-radius:8px; background:#fff;
    border-left:5px solid var(--gray); box-shadow:0 1px 2px rgba(0,0,0,.05); cursor:pointer; white-space:nowrap;
  }

  /* ===== 過關 ===== */
  .clear{text-align:center; padding:30px 16px;}
  .clear .big{font-size:54px;}
  .clear h2{color:var(--green); font-size:24px; margin:10px 0 6px;}
  .clear p{color:#5a6b7d; font-size:14px; margin:4px 0;}
  .clear button{
    margin-top:18px; font-size:17px; font-weight:700; padding:14px 28px; border:none;
    background:var(--navy); color:#fff; border-radius:12px; cursor:pointer;
  }

  .toolbar{display:flex; justify-content:center; gap:10px; margin-top:18px;}
  .toolbar button{
    font-size:13px; padding:9px 14px; border:1px solid #C9D6E6; background:#fff;
    border-radius:9px; cursor:pointer; color:#46586b;
  }

  /* ===== 複習 hub 入口 ===== */
  .hub{display:flex; gap:10px; margin:0 0 14px;}
  .hubbtn{flex:1; background:#fff; border:2px solid #D5E0EE; border-radius:14px; padding:13px 8px;
    cursor:pointer; display:flex; flex-direction:column; gap:3px; align-items:center;}
  .hubbtn:active{transform:scale(.97);}
  .hubbtn b{font-size:15px; color:var(--navy);}
  .hubbtn span{font-size:11px; color:#8499AE;}

  /* ===== 分頁 ===== */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{flex:1; padding:11px; border:2px solid #D5E0EE; background:#fff; border-radius:10px;
    font-size:14px; font-weight:600; color:#5a6b7d; cursor:pointer;}
  .tab.on{background:var(--navy); color:#fff; border-color:var(--navy);}

  /* ===== 單字表 ===== */
  .wlsec{margin-bottom:16px;}
  .wlhead{font-size:14px; font-weight:700; color:var(--navy); background:#EEF4FC;
    padding:8px 12px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between;}
  .wlhead small{color:#8499AE; font-weight:500; font-size:12px;}
  .wltable{background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(31,58,95,.08);}
  .wlrow{display:flex; align-items:center; gap:5px; padding:9px 10px; border-bottom:1px solid #F0F4F9; cursor:pointer;}
  .wlrow:last-child{border-bottom:none;}
  .wlrow:active{background:#F4F8FD;}
  .wlrow.locked{cursor:default;}
  .wlbase{flex:0 0 24%; font-weight:700; color:var(--navy); font-size:15px;}
  .wlrow.locked .wlbase{color:#90a0b0;}
  .wlform{flex:1; color:#46586b; font-size:14px;}
  .wlrow.locked .wlform{color:#C5D0DC;}
  .wlcn{flex:0 0 15%; font-size:12px; color:#8499AE; text-align:right; white-space:nowrap;}
  .wllv{flex:0 0 32px; font-size:10px; color:var(--blue); text-align:right; font-weight:600;}
  .wllock{padding:11px 12px; font-size:12px; color:#9fb2c8; background:#fff; border-radius:10px;}
  .seetable{margin-top:18px; width:100%; padding:11px; border:1px dashed #B7C4D6; background:#F8FBFF;
    color:var(--blue); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;}
  .regtable{margin-top:10px;}

  footer{text-align:center; font-size:11px; color:#9fb2c8; padding:14px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="row">
    <button class="back" id="backBtn">‹ 地圖</button>
    <h1 id="hTitle">動詞三態闖關</h1>
  </div>
  <div class="sub" id="hSub">選原形的「過去式」＋「過去分詞」‧ 連過 2 次就精通</div>
  <div class="topbar"><div id="topBar"></div></div>
</header>
<main id="app"></main>
<footer>離線可用 ‧ 進度存在這台裝置 ‧ felix_agent</footer>
</div>

<script>
/* ===== 題庫：[原形, 過去式, 過去分詞, 中文]；類型自動判定 ===== */
const RAW = [
  ["cut","cut","cut","切"],["put","put","put","放"],["hit","hit","hit","打、撞"],
  ["let","let","let","讓"],["set","set","set","設定"],["shut","shut","shut","關"],
  ["cost","cost","cost","花費"],["hurt","hurt","hurt","弄傷"],["read","read","read","讀"],
  ["spread","spread","spread","散布"],["quit","quit","quit","放棄"],["bet","bet","bet","打賭"],
  ["fit","fit","fit","合身"],
  ["buy","bought","bought","買"],["bring","brought","brought","帶來"],["think","thought","thought","想"],
  ["catch","caught","caught","抓住"],["teach","taught","taught","教"],["fight","fought","fought","打架"],
  ["build","built","built","建造"],["send","sent","sent","寄、送"],["spend","spent","spent","花費"],
  ["lend","lent","lent","借出"],["bend","bent","bent","彎曲"],["lose","lost","lost","遺失"],
  ["feel","felt","felt","感覺"],["keep","kept","kept","保持"],["sleep","slept","slept","睡"],
  ["sweep","swept","swept","打掃"],["meet","met","met","遇見"],["feed","fed","fed","餵"],
  ["lead","led","led","帶領"],["leave","left","left","離開"],["mean","meant","meant","意思是"],
  ["sit","sat","sat","坐"],["stand","stood","stood","站"],["understand","understood","understood","了解"],
  ["hold","held","held","握"],["find","found","found","找到"],["hear","heard","heard","聽見"],
  ["hang","hung","hung","懸掛"],["dig","dug","dug","挖"],["win","won","won","贏"],
  ["stick","stuck","stuck","黏住"],["sell","sold","sold","賣"],["tell","told","told","告訴"],
  ["pay","paid","paid","付錢"],["say","said","said","說"],["make","made","made","製作"],
  ["have","had","had","有"],["get","got","got","得到"],["shoot","shot","shot","射擊"],
  ["light","lit","lit","點亮"],["lay","laid","laid","放置"],["shine","shone","shone","發光"],
  ["go","went","gone","去"],["do","did","done","做"],["see","saw","seen","看見"],
  ["eat","ate","eaten","吃"],["give","gave","given","給"],["take","took","taken","拿"],
  ["write","wrote","written","寫"],["drive","drove","driven","開車"],["ride","rode","ridden","騎"],
  ["rise","rose","risen","上升"],["speak","spoke","spoken","說"],["break","broke","broken","打破"],
  ["choose","chose","chosen","選擇"],["freeze","froze","frozen","結冰"],["steal","stole","stolen","偷"],
  ["wake","woke","woken","醒來"],["wear","wore","worn","穿戴"],["tear","tore","torn","撕"],
  ["swear","swore","sworn","發誓"],["fly","flew","flown","飛"],["draw","drew","drawn","畫"],
  ["throw","threw","thrown","丟"],["grow","grew","grown","成長"],["know","knew","known","知道"],
  ["blow","blew","blown","吹"],["show","showed","shown","展示"],["sing","sang","sung","唱"],
  ["ring","rang","rung","響"],["drink","drank","drunk","喝"],["swim","swam","swum","游泳"],
  ["begin","began","begun","開始"],["sink","sank","sunk","下沉"],["fall","fell","fallen","落下"],
  ["forget","forgot","forgotten","忘記"],["forgive","forgave","forgiven","原諒"],["hide","hid","hidden","躲藏"],
  ["bite","bit","bitten","咬"],["beat","beat","beaten","打敗"],["mistake","mistook","mistaken","弄錯"],
  ["lie","lay","lain","躺"],
  ["come","came","come","來"],["become","became","become","變成"],["run","ran","run","跑"]
];

function typeOf(r){
  const [a,b,c]=r;
  if(a===b&&b===c) return "aaa";
  if(b===c) return "abb";
  if(a===c) return "aba";
  return "abc";
}
/* 高頻常見字（往前排） */
const COMMON = new Set(["go","do","see","get","make","take","come","give","know","think","say","find","tell","put","run","eat","read","let","sit","buy","cut","win","pay","feel","keep","leave","meet","hold","hear","have","sell","stand","bring","catch","teach","sleep","speak","break","write","drive","fall","grow","show","sing","drink","begin","wear","throw","fly","draw","know","hit","set","lose","build","send","spend"]);
const TYPEW = {aaa:0, aba:1, abb:1, abc:2};
function diffScore(r){
  const len=r[0].length;
  const t=TYPEW[typeOf(r)];
  const freq=COMMON.has(r[0])?0:3;        // 生僻字往後
  return len*10 + t*4 + freq + len; // len 主導：短字、簡單規則、常見 → 前面
}
const VERBS = RAW.map(r=>r.concat([typeOf(r)]));
const SORTED = [...VERBS].sort((a,b)=>diffScore(a)-diffScore(b));

const REGIONS=10;
/* 四種規則各自按難度排序後輪流分配到 10 區：每區都混到不同規則，整體難度仍逐區遞增 */
function buildRegions(){
  const byType={aaa:[],abb:[],abc:[],aba:[]};
  SORTED.forEach(r=>byType[r[4]].push(r));   // SORTED 已按難度，故各類型內也由易到難
  const regions=Array.from({length:REGIONS},()=>[]);
  ["aaa","abb","abc","aba"].forEach(t=>{
    const arr=byType[t], n=arr.length;
    for(let k=0;k<n;k++){ regions[Math.floor(k*REGIONS/n)].push(arr[k]); }
  });
  regions.forEach(reg=>reg.sort((a,b)=>diffScore(a)-diffScore(b)));  // 區內也由易到難
  return regions;
}
const REGION_LIST = buildRegions();
const REGION_NAMES = ["入門","起步","熟悉","進階","挑戰","強化","精熟","高手","大師","通關"];

/* ===== 記憶（localStorage v2） ===== */
const KEY="verbTrainer_v2";
const MASTER_STREAK=2;
let DB = loadDB();
function loadDB(){ try{const d=JSON.parse(localStorage.getItem(KEY)); if(d&&d.ver===2&&d.verbs){ if(!d.review) d.review={}; return d; }}catch(e){} return {ver:2, verbs:{}, review:{}}; }
function saveDB(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
function vs(v){ if(!DB.verbs[v]) DB.verbs[v]={c:0,w:0,s:0,m:false}; return DB.verbs[v]; }
function rs(v){ if(!DB.review[v]) DB.review[v]={c:0,w:0,s:0}; return DB.review[v]; }  // 綜合複習：獨立紀錄

function regionMastered(ri){ return REGION_LIST[ri].filter(r=>vs(r[0]).m).length; }
function regionDone(ri){ return regionMastered(ri)===REGION_LIST[ri].length; }
function regionUnlocked(ri){ return ri===0 || regionDone(ri-1); }
function totalMastered(){ return VERBS.filter(r=>vs(r[0]).m).length; }

/* 每字所屬區、複習題庫（已解鎖區的字） */
const VERB_REGION={}; REGION_LIST.forEach((reg,i)=>reg.forEach(r=>VERB_REGION[r[0]]=i));
function reviewPool(){ const out=[]; REGION_LIST.forEach((reg,i)=>{ if(regionUnlocked(i)) out.push(...reg); }); return out; }
function pickReview(){
  const pool=reviewPool(); if(!pool.length) return null;
  const weighted=[];
  pool.forEach(r=>{ const s=rs(r[0]); const w=1+s.w*2+(s.s===0?1:0); for(let k=0;k<w;k++) weighted.push(r); });
  return weighted[Math.floor(Math.random()*weighted.length)];
}

/* ===== 音效（Web Audio 合成） ===== */
let muted=false, actx=null;
function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); return actx; }
function tone(freq,start,dur,type,vol){
  const a=audio(); if(!a||muted) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  const t=a.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.02);
}
function sndClick(){ tone(660,0,0.05,"square",0.10); }
function sndRight(){ tone(659.25,0,0.12,"sine",0.2); tone(987.77,0.10,0.18,"sine",0.2); }
function sndWrong(){ tone(196,0,0.22,"sawtooth",0.16); tone(155.56,0.12,0.26,"sawtooth",0.15); }

/* ===== 語音（念三態） ===== */
function speakThree(v){
  if(muted || !("speechSynthesis" in window)) return;
  const row=VERBS.find(r=>r[0]===v); if(!row) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(row[0]+", "+row[1]+", "+row[2]);
    u.lang="en-US"; u.rate=0.8;
    const vsx=speechSynthesis.getVoices();
    const en=vsx.find(x=>/en[-_]US/i.test(x.lang))||vsx.find(x=>/^en/i.test(x.lang));
    if(en) u.voice=en;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ===== 干擾項：似真錯誤拼法產生器 ===== */
function regularize(v){
  if(/e$/.test(v)) return v+"d";
  if(/[^aeiou]y$/.test(v)) return v.slice(0,-1)+"ied";
  if(/^[a-z]*[aeiou][^aeiouwxy]$/.test(v)) return v+v.slice(-1)+"ed";
  return v+"ed";
}
function vowelSwaps(v){
  const m=v.match(/[aeiou](?=[^aeiou]*$)/); // 最後一個母音
  if(!m) return [];
  const i=m.index, out=[];
  ["a","o","u","e","i"].forEach(nv=>{ if(nv!==v[i]) out.push(v.slice(0,i)+nv+v.slice(i+1)); });
  return out;
}
function fakeIrregular(base){
  const head=(base.match(/^[^aeiou]*/)||[""])[0] || base[0];
  const out=[];
  ["o","u","a"].forEach(vw=>["de","ne","te","re","le"].forEach(t=>out.push(head+vw+t)));
  ["ought","ung","ank","unk","ew","ode","ore"].forEach(t=>out.push(head+t));
  return out;
}
function isLetters(s){ return /^[a-z]+$/.test(s); }
function generateDistractors(row, answerIdx){
  const base=row[0], answer=row[answerIdx];
  const banned=new Set([row[0],row[1],row[2]]); // 排除真三態，避免洩漏/重複
  const out=[], set=new Set();
  const tryAdd=(val)=>{ if(!val) return; val=(""+val).toLowerCase(); if(val.length<2||!isLetters(val)) return; if(banned.has(val)||set.has(val)) return; set.add(val); out.push(val); };
  // 依優先序：規則化錯誤最像、最有教學意義 → 字幹母音變化 → 字尾變化 → 拼湊兜底
  const tiers=[
    [regularize(base), base+"ed"],                                       // 學生最常犯的「加 ed」
    [...vowelSwaps(base), ...vowelSwaps(answer)],                         // 保留字幹框架的母音變化
    [answer.replace(/e$/,"")+"en", answer+"en", base+"en", base+"t"],    // 字尾變化
    fakeIrregular(base),                                                  // 模仿不規則（兜底）
    shuffle(VERBS.map(r=>r[answerIdx]))                                   // 借真實同態（最終兜底）
  ];
  for(let i=0;i<tiers.length && out.length<3;i++){
    const items = i<3 ? shuffle(tiers[i]) : tiers[i];   // 前 3 層內部洗牌、層間保序
    for(const c of items){ if(out.length>=3) break; tryAdd(c); }
  }
  return out.slice(0,3);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ===== 畫面狀態 ===== */
let view="map", curRegion=null, curRow=null;
let ptOpts=[], ppOpts=[], ptPick=null, ppPick=null, graded=false;
const app=()=>document.getElementById("app");

function setTop(){ document.getElementById("topBar").style.width=(totalMastered()/VERBS.length*100)+"%"; }

/* ===== 地圖 ===== */
function renderMap(){
  view="map"; curRegion=null;
  document.getElementById("backBtn").style.display="none";
  document.getElementById("hTitle").textContent="動詞三態闖關";
  document.getElementById("hSub").textContent=`精通 ${totalMastered()} / ${VERBS.length} 個動詞`;
  setTop();
  let html=`<div class="hub">
      <button class="hubbtn" id="wlBtn"><b>📖 單字表</b><span>對照背三態變化</span></button>
      <button class="hubbtn" id="rvBtn"><b>🔁 綜合複習</b><span>混合測驗自我檢查</span></button>
    </div>
    <div class="maptitle">選一區開始 ‧ 整區精通才解鎖下一區</div><div class="regions">`;
  REGION_LIST.forEach((reg,i)=>{
    const m=regionMastered(i), n=reg.length, done=regionDone(i), unlocked=regionUnlocked(i);
    const cls=done?"done":(unlocked?"cur":"locked");
    const status= !unlocked ? `<div class="ring lock">🔒</div>`
      : `<div class="mini">${m} / ${n} 字</div>${ringSvg(m,n,done)}`;
    html+=`<div class="region ${cls}" data-ri="${i}">
        <div class="lv">LV ${i+1}</div>
        <div class="name">${REGION_NAMES[i]}</div>
        ${status}
      </div>`;
  });
  html+=`</div>
    <div class="toolbar">
      <button id="muteBtn">${muted?"🔇 音效關":"🔊 音效開"}</button>
      <button id="resetBtn">↺ 重置全部進度</button>
    </div>`;
  app().innerHTML=html;
  app().querySelectorAll(".region").forEach(el=>el.addEventListener("click",()=>{
    const ri=+el.dataset.ri;
    if(!regionUnlocked(ri)){ sndWrong(); return; }
    sndClick(); enterRegion(ri);
  }));
  document.getElementById("wlBtn").addEventListener("click",()=>{ sndClick(); enterWordlist(); });
  document.getElementById("rvBtn").addEventListener("click",()=>{ sndClick(); enterReview(); });
  bindTools();
}
function ringSvg(m,n,done){
  const pct=n? m/n : 0, r=18, c=2*Math.PI*r, off=c*(1-pct);
  const col=done?"var(--green)":"var(--blue)";
  return `<svg class="ring" viewBox="0 0 46 46">
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="#E3EBF5" stroke-width="5"/>
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
      transform="rotate(-90 23 23)"/>
    <text x="23" y="27" text-anchor="middle" font-size="12" fill="${col}" font-weight="700">${Math.round(pct*100)}%</text>
  </svg>`;
}

/* ===== 進入區、出題 ===== */
function enterRegion(ri){
  curRegion=ri; view="quiz";
  document.getElementById("backBtn").style.display="inline-block";
  document.getElementById("hTitle").textContent=`LV ${ri+1}・${REGION_NAMES[ri]}`;
  document.getElementById("hSub").textContent="選原形的「過去式」＋「過去分詞」";
  nextQuestion();
}
function pickInRegion(ri){
  const pool=REGION_LIST[ri].filter(r=>!vs(r[0]).m);
  if(!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
function nextQuestion(){
  if(regionDone(curRegion)){ renderClear(); return; }
  curRow=pickInRegion(curRegion);
  ptOpts=shuffle([curRow[1], ...generateDistractors(curRow,1)]);
  ppOpts=shuffle([curRow[2], ...generateDistractors(curRow,2)]);
  ptPick=null; ppPick=null; graded=false;
  renderQuiz();
}
function renderQuiz(){
  const m=regionMastered(curRegion), n=REGION_LIST[curRegion].length;
  const optBtns=(opts,grp)=>opts.map(o=>`<button class="opt" data-grp="${grp}" data-v="${o}">${o}</button>`).join("");
  app().innerHTML=`
    <div class="rprog">
      <span>本區進度</span>
      <div class="bar"><div style="width:${m/n*100}%"></div></div>
      <span>${m}/${n}</span>
    </div>
    <div class="qcard">
      <div class="base">${curRow[0]}</div>
      <div class="basecn">（${curRow[3]}）</div>
      <div class="hint">這個動詞的過去式與過去分詞各是？</div>

      <div class="group">
        <div class="grouplbl"><span class="tag">過去式</span> past <span class="mk" id="mkPt"></span></div>
        <div class="opts" id="grpPt">${optBtns(ptOpts,"pt")}</div>
      </div>
      <div class="group">
        <div class="grouplbl"><span class="tag">過去分詞</span> p.p. <span class="mk" id="mkPp"></span></div>
        <div class="opts" id="grpPp">${optBtns(ppOpts,"pp")}</div>
      </div>

      <button class="submit" id="submitBtn" disabled>請先各選一個答案</button>
      <div class="result" id="result"></div>
    </div>
    <button class="seetable" id="seeTableBtn">📖 看本區變化表</button>
    <div class="wltable regtable" id="regTable" style="display:none">${REGION_LIST[curRegion].map(r=>wlRow(r,curRegion,true)).join("")}</div>
    ${famHtml()}`;
  app().querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>pickOpt(b)));
  document.getElementById("submitBtn").addEventListener("click",onSubmit);
  const stb=document.getElementById("seeTableBtn");
  stb.addEventListener("click",()=>{ sndClick(); const t=document.getElementById("regTable");
    const show=t.style.display==="none"; t.style.display=show?"block":"none";
    stb.textContent=show?"📖 收合變化表":"📖 看本區變化表"; if(show) bindWlRows(); });
  bindChips();
}
function pickOpt(btn){
  if(graded) return;
  const grp=btn.dataset.grp;
  app().querySelectorAll(`.opt[data-grp="${grp}"]`).forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  if(grp==="pt") ptPick=btn.dataset.v; else ppPick=btn.dataset.v;
  sndClick();
  const sb=document.getElementById("submitBtn");
  if(ptPick!=null && ppPick!=null){ sb.disabled=false; sb.textContent="確認作答"; }
}
function onSubmit(){
  if(graded){ nextQuestion(); return; }   // 第二次按 = 下一題
  graded=true;
  const okPt=ptPick===curRow[1], okPp=ppPick===curRow[2], allOk=okPt&&okPp;
  const s=vs(curRow[0]);
  if(allOk){ s.c++; s.s++; if(s.s>=MASTER_STREAK) s.m=true; }
  else { s.w++; s.s=0; }
  saveDB();
  markGroup("pt", curRow[1]); markGroup("pp", curRow[2]);
  document.getElementById("mkPt").textContent=okPt?"✅":"❌";
  document.getElementById("mkPp").textContent=okPp?"✅":"❌";
  setTimeout(()=> allOk?sndRight():sndWrong(), 110);
  setTimeout(()=> speakThree(curRow[0]), 480);
  const res=document.getElementById("result");
  res.className="result "+(allOk?"ok":"no");
  let msg = allOk ? (s.m?"🟢 太棒了，這個字精通了！":"✅ 兩格全對！再對一次就精通") : "❌ 再看一次正確變化";
  res.innerHTML=msg+`<span class="three">${curRow[0]} – ${curRow[1]} – ${curRow[2]} <small>（${curRow[3]}）</small></span>`;
  const sb=document.getElementById("submitBtn");
  sb.disabled=false;
  sb.textContent= regionDone(curRegion) ? "🎉 完成本區！" : "下一題 ▶";
  // 更新本區進度與熟悉度
  const m=regionMastered(curRegion), n=REGION_LIST[curRegion].length;
  const rb=document.querySelector(".rprog .bar>div"); if(rb) rb.style.width=(m/n*100)+"%";
  const rt=document.querySelector(".rprog span:last-child"); if(rt) rt.textContent=`${m}/${n}`;
  refreshChips(); setTop();
}
function markGroup(grp, correct){
  app().querySelectorAll(`.opt[data-grp="${grp}"]`).forEach(b=>{
    b.disabled=true;
    if(b.dataset.v===correct) b.classList.add("correct");
    else if(b.classList.contains("sel")) b.classList.add("wrong");
  });
}

/* ===== 本區熟悉度色塊 ===== */
function colorOfStat(s, green){ if(green) return "var(--green)"; if(s.c+s.w===0) return "var(--gray)"; if(s.s===0) return "var(--red)"; return "var(--amber)"; }
function colorOf(v){ const s=vs(v); return colorOfStat(s, s.m); }
function colorOfReview(v){ const s=rs(v); return colorOfStat(s, s.s>=2); }  // 複習：連對 2 次顯綠「記得牢」
function famHtml(){
  return `<div class="famtitle">
      <span>本區單字（點字可聽發音）</span>
      <span class="legend"><b style="background:var(--gray)"></b>未練<b style="background:var(--red)"></b>生疏<b style="background:var(--amber)"></b>學習中<b style="background:var(--green)"></b>精通</span>
    </div>
    <div class="chips" id="chips">${chipsInner()}</div>`;
}
function chipsInner(){
  return REGION_LIST[curRegion].map(r=>{
    const s=vs(r[0]);
    return `<span class="chip" data-v="${r[0]}" title="${r[0]} – ${r[1]} – ${r[2]}（${r[3]}）" style="border-left-color:${colorOf(r[0])}">${r[0]}</span>`;
  }).join("");
}
function refreshChips(){ const c=document.getElementById("chips"); if(c) c.innerHTML=chipsInner(); bindChips(); }
function bindChips(){ app().querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{ sndClick(); speakThree(c.dataset.v); })); }

/* ===== 過關 ===== */
function renderClear(){
  view="clear";
  const next=curRegion+1, hasNext=next<REGIONS;
  app().innerHTML=`<div class="clear">
    <div class="big">🎉</div>
    <h2>LV ${curRegion+1}・${REGION_NAMES[curRegion]} 通關！</h2>
    <p>這一區 ${REGION_LIST[curRegion].length} 個動詞都精通了。</p>
    ${hasNext?`<p>已解鎖 <b>LV ${next+1}・${REGION_NAMES[next]}</b></p>
       <button id="nextRegBtn">前往下一區 ▶</button><br>`
      :`<p>你已經完成全部 10 區、${VERBS.length} 個動詞！</p>`}
    <div class="toolbar"><button id="toMapBtn">回關卡地圖</button></div>
  </div>`;
  setTop();
  const nb=document.getElementById("nextRegBtn"); if(nb) nb.addEventListener("click",()=>{ sndClick(); enterRegion(next); });
  document.getElementById("toMapBtn").addEventListener("click",()=>{ sndClick(); renderMap(); });
}

/* ===== 單字表（複習中心） ===== */
const RULE_GROUPS=[
  {t:"aaa", name:"三態不變", eg:"cut–cut–cut"},
  {t:"abb", name:"過去式 = 過去分詞", eg:"buy–bought–bought"},
  {t:"abc", name:"三態都不同", eg:"go–went–gone"},
  {t:"aba", name:"原形 = 過去分詞", eg:"come–came–come"}
];
function wlRow(r,i,unlocked){
  const lv=`<span class="wllv">LV${i+1}</span>`;
  if(unlocked){
    return `<div class="wlrow" data-v="${r[0]}">
      <span class="wlbase">${r[0]}</span><span class="wlform">${r[1]}</span>
      <span class="wlform">${r[2]}</span><span class="wlcn">${r[3]}</span>${lv}</div>`;
  }
  return `<div class="wlrow locked">
      <span class="wlbase">${r[0]}</span><span class="wlform">🔒</span>
      <span class="wlform">🔒</span><span class="wlcn">${r[3]}</span>${lv}</div>`;
}
function bindWlRows(){ app().querySelectorAll(".wlrow:not(.locked)").forEach(el=>el.addEventListener("click",()=>{ sndClick(); speakThree(el.dataset.v); })); }

let wlTab="region";
function enterWordlist(){
  view="wordlist"; curRegion=null;
  document.getElementById("backBtn").style.display="inline-block";
  document.getElementById("hTitle").textContent="📖 單字表";
  document.getElementById("hSub").textContent="已解鎖區可看完整三態，未解鎖顯示 🔒";
  renderWordlist();
}
function renderWordlist(){
  app().innerHTML=`<div class="tabs">
      <button class="tab ${wlTab==='region'?'on':''}" data-tab="region">分區表</button>
      <button class="tab ${wlTab==='rules'?'on':''}" data-tab="rules">規則總表</button>
    </div><div>${wlTab==='region'?wlRegionHtml():wlRulesHtml()}</div>`;
  app().querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{ wlTab=t.dataset.tab; sndClick(); renderWordlist(); }));
  bindWlRows();
}
function wlRegionHtml(){
  return REGION_LIST.map((reg,i)=>{
    const unlocked=regionUnlocked(i);
    const head=`<div class="wlhead"><span>LV ${i+1}・${REGION_NAMES[i]}</span>${unlocked?"":"<span>🔒</span>"}</div>`;
    if(!unlocked) return `<div class="wlsec">${head}<div class="wllock">完成前一區即可解鎖查看</div></div>`;
    return `<div class="wlsec">${head}<div class="wltable">${reg.map(r=>wlRow(r,i,true)).join("")}</div></div>`;
  }).join("");
}
function wlRulesHtml(){
  return RULE_GROUPS.map(g=>{
    const list=VERBS.filter(r=>r[4]===g.t).sort((a,b)=>VERB_REGION[a[0]]-VERB_REGION[b[0]]);
    const rows=list.map(r=>{ const i=VERB_REGION[r[0]]; return wlRow(r,i,regionUnlocked(i)); }).join("");
    return `<div class="wlsec"><div class="wlhead"><span>${g.name}</span><small>${g.eg}</small></div><div class="wltable">${rows}</div></div>`;
  }).join("");
}

/* ===== 綜合複習（獨立紀錄、無限刷） ===== */
function enterReview(){
  view="review"; curRegion=null;
  document.getElementById("backBtn").style.display="inline-block";
  document.getElementById("hTitle").textContent="🔁 綜合複習";
  document.getElementById("hSub").textContent="已解鎖區混合測驗 ‧ 不影響闖關進度";
  nextReview();
}
function reviewStats(){ const pool=reviewPool(); return {green:pool.filter(r=>rs(r[0]).s>=2).length, total:pool.length}; }
function nextReview(){
  curRow=pickReview();
  if(!curRow){ app().innerHTML=`<div class="clear"><div class="big">📭</div><p>目前還沒有可複習的單字，先去闖關解鎖吧！</p><div class="toolbar"><button id="toMapBtn">回地圖</button></div></div>`;
    document.getElementById("toMapBtn").addEventListener("click",()=>{ sndClick(); renderMap(); }); return; }
  ptOpts=shuffle([curRow[1], ...generateDistractors(curRow,1)]);
  ppOpts=shuffle([curRow[2], ...generateDistractors(curRow,2)]);
  ptPick=null; ppPick=null; graded=false;
  renderReview();
}
function renderReview(){
  const st=reviewStats();
  const optBtns=(opts,grp)=>opts.map(o=>`<button class="opt" data-grp="${grp}" data-v="${o}">${o}</button>`).join("");
  app().innerHTML=`
    <div class="rprog"><span>記得牢</span>
      <div class="bar"><div style="width:${st.total?st.green/st.total*100:0}%"></div></div>
      <span>${st.green}/${st.total}</span></div>
    <div class="qcard">
      <div class="base">${curRow[0]}</div>
      <div class="basecn">（${curRow[3]}）</div>
      <div class="hint">綜合複習 ‧ 過去式與過去分詞各是？</div>
      <div class="group">
        <div class="grouplbl"><span class="tag">過去式</span> past <span class="mk" id="mkPt"></span></div>
        <div class="opts" id="grpPt">${optBtns(ptOpts,"pt")}</div>
      </div>
      <div class="group">
        <div class="grouplbl"><span class="tag">過去分詞</span> p.p. <span class="mk" id="mkPp"></span></div>
        <div class="opts" id="grpPp">${optBtns(ppOpts,"pp")}</div>
      </div>
      <button class="submit" id="submitBtn" disabled>請先各選一個答案</button>
      <div class="result" id="result"></div>
    </div>
    ${reviewFamHtml()}`;
  app().querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>pickOpt(b)));
  document.getElementById("submitBtn").addEventListener("click",onReviewSubmit);
  document.getElementById("rvResetBtn").addEventListener("click",()=>{ if(confirm("重置綜合複習的熟悉度紀錄？（不影響闖關進度）")){ DB.review={}; saveDB(); nextReview(); } });
  bindChips();
}
function onReviewSubmit(){
  if(graded){ nextReview(); return; }
  graded=true;
  const okPt=ptPick===curRow[1], okPp=ppPick===curRow[2], allOk=okPt&&okPp;
  const s=rs(curRow[0]);
  if(allOk){ s.c++; s.s++; } else { s.w++; s.s=0; }
  saveDB();
  markGroup("pt", curRow[1]); markGroup("pp", curRow[2]);
  document.getElementById("mkPt").textContent=okPt?"✅":"❌";
  document.getElementById("mkPp").textContent=okPp?"✅":"❌";
  setTimeout(()=> allOk?sndRight():sndWrong(), 110);
  setTimeout(()=> speakThree(curRow[0]), 480);
  const res=document.getElementById("result");
  res.className="result "+(allOk?"ok":"no");
  res.innerHTML=(allOk?(s.s>=2?"🟢 答對！記得很牢":"✅ 答對！再對一次就標記記得牢"):"❌ 再看一次正確變化")
    +`<span class="three">${curRow[0]} – ${curRow[1]} – ${curRow[2]} <small>（${curRow[3]}）</small></span>`;
  const sb=document.getElementById("submitBtn"); sb.disabled=false; sb.textContent="下一題 ▶";
  const st=reviewStats();
  const rb=document.querySelector(".rprog .bar>div"); if(rb) rb.style.width=(st.total?st.green/st.total*100:0)+"%";
  const rt=document.querySelector(".rprog span:last-child"); if(rt) rt.textContent=`${st.green}/${st.total}`;
  refreshReviewChips();
}
function reviewFamHtml(){
  return `<div class="famtitle">
      <span>複習熟悉度（點字發音）</span>
      <span class="legend"><b style="background:var(--gray)"></b>未練<b style="background:var(--red)"></b>生疏<b style="background:var(--amber)"></b>練習中<b style="background:var(--green)"></b>記得牢</span>
    </div>
    <div class="chips" id="chips">${reviewChipsInner()}</div>
    <div class="toolbar"><button id="rvResetBtn">↺ 重置綜合複習紀錄</button></div>`;
}
function reviewChipsInner(){
  return reviewPool().map(r=>`<span class="chip" data-v="${r[0]}" title="${r[0]} – ${r[1]} – ${r[2]}（${r[3]}）" style="border-left-color:${colorOfReview(r[0])}">${r[0]}</span>`).join("");
}
function refreshReviewChips(){ const c=document.getElementById("chips"); if(c) c.innerHTML=reviewChipsInner(); bindChips(); }

/* ===== 工具列 ===== */
function bindTools(){
  const mb=document.getElementById("muteBtn");
  if(mb) mb.addEventListener("click",function(){ muted=!muted; this.textContent=muted?"🔇 音效關":"🔊 音效開"; if(muted&&"speechSynthesis"in window) speechSynthesis.cancel(); });
  const rb=document.getElementById("resetBtn");
  if(rb) rb.addEventListener("click",()=>{ if(confirm("確定清除全部關卡與練習紀錄、重新開始嗎？")){ DB={ver:2,verbs:{},review:{}}; saveDB(); renderMap(); } });
}
document.getElementById("backBtn").addEventListener("click",()=>{ sndClick(); renderMap(); });

if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=()=>{}; speechSynthesis.getVoices(); }
renderMap();
</script>
</body>
</html>
