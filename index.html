<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3A5F">
<meta name="apple-mobile-web-app-title" content="三態闖關">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>動詞三態闖關</title>
<style>
  :root{
    --navy:#1F3A5F; --blue:#4A7BC8; --red:#C0392B; --bg:#ECF3FB;
    --green:#27AE60; --amber:#E6A700; --gray:#B0BEC5;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif;
    background:#F4F8FD; color:#2C3E50; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .wrap{max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column;}
  header{
    background:var(--navy); color:#fff; padding:calc(12px + var(--safe-top)) 16px 12px;
    position:sticky; top:0; z-index:10;
  }
  header .row{display:flex; align-items:center; gap:10px;}
  header h1{margin:0; font-size:18px; letter-spacing:1px; flex:1;}
  header .back{
    background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:8px;
    font-size:14px; padding:8px 12px; cursor:pointer; display:none;
  }
  header .sub{font-size:12px; color:#C8D6E5; margin-top:4px;}
  .topbar{height:8px; background:#D7E2F0; border-radius:5px; overflow:hidden; margin-top:10px;}
  .topbar > div{height:100%; background:var(--green); width:0%; transition:width .4s;}
  main{flex:1; padding:14px 14px calc(20px + var(--safe-bot));}

  /* ===== 地圖 ===== */
  .maptitle{font-size:14px; color:#5a6b7d; margin:4px 2px 12px; text-align:center;}
  .regions{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .region{
    background:#fff; border-radius:16px; padding:16px 12px; text-align:center;
    box-shadow:0 3px 10px rgba(31,58,95,.10); border:2px solid #E3EBF5;
    cursor:pointer; transition:transform .08s; position:relative; min-height:120px;
    display:flex; flex-direction:column; justify-content:center; gap:6px;
  }
  .region:active{transform:scale(.97);}
  .region .lv{font-size:12px; color:var(--blue); font-weight:700; letter-spacing:1px;}
  .region .name{font-size:15px; font-weight:700; color:var(--navy);}
  .region .mini{font-size:11px; color:#8499AE;}
  .region .ring{margin:4px auto 0; width:46px; height:46px;}
  .region.locked{filter:grayscale(.8); opacity:.55; cursor:not-allowed;}
  .region.locked .lock{font-size:22px;}
  .region.done{border-color:var(--green);}
  .region.done::after{
    content:"★"; position:absolute; top:8px; right:10px; color:var(--green); font-size:16px;
  }
  .region.cur{border-color:var(--blue);}
  .rtbl{margin-top:8px; font-size:11px; padding:5px 10px; border:1px solid #C9D6E6;
    background:#F8FBFF; color:var(--blue); border-radius:8px; cursor:pointer; font-weight:600;}
  .rtbl:active{transform:scale(.94);}

  /* ===== 練習 ===== */
  .rprog{display:flex; align-items:center; gap:8px; margin:2px 2px 14px; font-size:12px; color:#5a6b7d;}
  .rprog .bar{flex:1; height:8px; background:#D7E2F0; border-radius:5px; overflow:hidden;}
  .rprog .bar>div{height:100%; background:var(--green); width:0%; transition:width .35s;}
  .qcard{
    background:#fff; border-radius:18px; padding:20px 16px; box-shadow:0 4px 14px rgba(31,58,95,.10);
  }
  .base{font-size:42px; font-weight:800; color:var(--navy); text-align:center; letter-spacing:1px; line-height:1.1;}
  .basecn{text-align:center; font-size:15px; color:#7a8a9c; margin-top:6px;}
  .hint{text-align:center; font-size:12px; color:#9fb2c8; margin:4px 0 14px;}
  .group{margin-top:14px;}
  .grouplbl{font-size:13px; font-weight:700; color:var(--blue); margin:0 2px 8px; display:flex; align-items:center; gap:6px;}
  .grouplbl .tag{background:#EEF4FC; color:var(--blue); border-radius:6px; padding:2px 8px; font-size:11px;}
  .grouplbl .mk{margin-left:auto; font-size:14px;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .opt{
    font-size:19px; font-weight:600; padding:15px 6px; border:2px solid #D5E0EE;
    background:#fff; border-radius:12px; cursor:pointer; color:var(--navy);
    transition:transform .06s, background .15s, border-color .15s; min-height:54px;
  }
  .opt:active{transform:scale(.96);}
  .opt.sel{border-color:var(--blue); background:#EEF4FC;}
  .opt.correct{background:#E5F6EC; border-color:var(--green); color:var(--green);}
  .opt.wrong{background:#FCE8E8; border-color:var(--red); color:var(--red);}
  .opt[disabled]{cursor:default;}
  .submit{
    margin-top:18px; width:100%; font-size:18px; font-weight:700; padding:16px; border:none;
    background:var(--navy); color:#fff; border-radius:14px; cursor:pointer; min-height:56px;
  }
  .submit:disabled{background:#B7C4D6; cursor:default;}
  .submit:active:not(:disabled){transform:scale(.98);}
  .result{margin-top:16px; text-align:center; font-size:17px; font-weight:700; min-height:24px;}
  .result.ok{color:var(--green);} .result.no{color:var(--red);}
  .result .three{display:block; font-size:16px; color:var(--navy); margin-top:8px; font-weight:600; letter-spacing:.5px;}
  .result .three small{color:#7a8a9c; font-weight:500;}

  /* ===== 本區熟悉度 ===== */
  .famtitle{font-size:12px; color:#8499AE; margin:20px 4px 8px; display:flex; justify-content:space-between;}
  .legend b{display:inline-block; width:9px; height:9px; border-radius:50%; margin:0 2px 0 8px; vertical-align:middle;}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    font-size:12px; padding:5px 9px; border-radius:8px; background:#fff;
    border-left:5px solid var(--gray); box-shadow:0 1px 2px rgba(0,0,0,.05); cursor:pointer; white-space:nowrap;
  }

  /* ===== 過關 ===== */
  .clear{text-align:center; padding:30px 16px;}
  .clear .big{font-size:54px;}
  .clear h2{color:var(--green); font-size:24px; margin:10px 0 6px;}
  .clear p{color:#5a6b7d; font-size:14px; margin:4px 0;}
  .clear button{
    margin-top:18px; font-size:17px; font-weight:700; padding:14px 28px; border:none;
    background:var(--navy); color:#fff; border-radius:12px; cursor:pointer;
  }

  .statbar{display:flex; justify-content:space-around; gap:6px; background:#fff; border-radius:12px;
    padding:10px 6px; margin-bottom:12px; box-shadow:0 2px 6px rgba(31,58,95,.08); font-size:12px; color:#5a6b7d;}
  .statbar b{color:var(--navy); font-size:14px;}
  .tinput{width:100%; font-size:20px; font-weight:600; padding:13px 12px; border:2px solid #D5E0EE;
    border-radius:12px; color:var(--navy); text-align:center; outline:none;}
  .tinput:focus{border-color:var(--blue); background:#F8FBFF;}
  .tinput.correct{border-color:var(--green); background:#E5F6EC; color:var(--green);}
  .tinput.wrong{border-color:var(--red); background:#FCE8E8; color:var(--red);}
  .toolbar{display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap;}
  .toolbar button{
    font-size:13px; padding:9px 14px; border:1px solid #C9D6E6; background:#fff;
    border-radius:9px; cursor:pointer; color:#46586b;
  }

  /* ===== 複習 hub 入口 ===== */
  .hub{display:flex; gap:10px; margin:0 0 14px;}
  .hubbtn{flex:1; background:#fff; border:2px solid #D5E0EE; border-radius:14px; padding:13px 8px;
    cursor:pointer; display:flex; flex-direction:column; gap:3px; align-items:center;}
  .hubbtn:active{transform:scale(.97);}
  .hubbtn b{font-size:15px; color:var(--navy);}
  .hubbtn span{font-size:11px; color:#8499AE;}

  /* ===== 分頁 ===== */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{flex:1; padding:11px; border:2px solid #D5E0EE; background:#fff; border-radius:10px;
    font-size:14px; font-weight:600; color:#5a6b7d; cursor:pointer;}
  .tab.on{background:var(--navy); color:#fff; border-color:var(--navy);}

  /* ===== 單字表 ===== */
  .wlsec{margin-bottom:16px;}
  .wlhead{font-size:14px; font-weight:700; color:var(--navy); background:#EEF4FC;
    padding:8px 12px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between;}
  .wlhead small{color:#8499AE; font-weight:500; font-size:12px;}
  .wltable{background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(31,58,95,.08);}
  .wlrow{display:flex; align-items:center; gap:5px; padding:9px 10px; border-bottom:1px solid #F0F4F9; cursor:pointer;}
  .wlrow:last-child{border-bottom:none;}
  .wlrow:active{background:#F4F8FD;}
  .wlrow.locked{cursor:default;}
  .wlbase{flex:0 0 24%; font-weight:700; color:var(--navy); font-size:15px;}
  .wlrow.locked .wlbase{color:#90a0b0;}
  .wlform{flex:1; color:#46586b; font-size:14px;}
  .wlrow.locked .wlform{color:#C5D0DC;}
  .wlcn{flex:0 0 15%; font-size:12px; color:#8499AE; text-align:right; white-space:nowrap;}
  .wllv{flex:0 0 32px; font-size:10px; color:var(--blue); text-align:right; font-weight:600;}
  .wllock{padding:11px 12px; font-size:12px; color:#9fb2c8; background:#fff; border-radius:10px;}
  .seetable{margin-top:18px; width:100%; padding:11px; border:1px dashed #B7C4D6; background:#F8FBFF;
    color:var(--blue); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;}
  .regtable{margin-top:10px;}

  footer{text-align:center; font-size:11px; color:#9fb2c8; padding:14px;}
</style>
</head>

function typeOf(r){
  const [a,b,c]=r;
  if(a===b&&b===c) return "aaa";
  if(b===c) return "abb";
  if(a===c) return "aba";
  return "abc";
}
/* 高頻常見字（往前排） */
const COMMON = new Set(["go","do","see","get","make","take","come","give","know","think","say","find","tell","put","run","eat","read","let","sit","buy","cut","win","pay","feel","keep","leave","meet","hold","hear","have","sell","stand","bring","catch","teach","sleep","speak","break","write","drive","fall","grow","show","sing","drink","begin","wear","throw","fly","draw","hit","set","lose","build","send","spend"]);
const TYPEW = {aaa:0, aba:1, abb:1, abc:2};
function diffScore(r){
  const len=r[0].length;
  const t=TYPEW[typeOf(r)];
  const freq=COMMON.has(r[0])?0:3;        // 生僻字往後
  return len*10 + t*4 + freq + len; // len 主導：短字、簡單規則、常見 → 前面
}
const VERBS = RAW.map(r=>r.concat([typeOf(r)]));
const SORTED = [...VERBS].sort((a,b)=>diffScore(a)-diffScore(b));

/* 四種規則各自按難度排序後輪流分配到 10 區：每區都混到不同規則，整體難度仍逐區遞增 */
function buildRegions(){
  const byType={aaa:[],abb:[],abc:[],aba:[]};
  SORTED.forEach(r=>byType[r[4]].push(r));   // SORTED 已按難度，故各類型內也由易到難
  const regions=Array.from({length:REGIONS},()=>[]);
  ["aaa","abb","abc","aba"].forEach(t=>{
    const arr=byType[t], n=arr.length;
    for(let k=0;k<n;k++){ regions[Math.floor(k*REGIONS/n)].push(arr[k]); }
  });
  regions.forEach(reg=>reg.sort((a,b)=>diffScore(a)-diffScore(b)));  // 區內也由易到難
  return regions;
}

/* #3 SRS：複習答對後間隔遞增(天)，答錯歸零；pickReview 依逾期程度加權 */
const SRS_IVL=[1,3,7,16,35];
function srsSchedule(s, correct){
  if(correct){ const i=Math.min(s.s, SRS_IVL.length-1); s.ivl=SRS_IVL[i]; }
  else { s.ivl=0; }
  s.due = Date.now() + s.ivl*86400000;
}
function srsOverdueWeight(s){
  if(!s.due) return 4;                      // 沒排程過(沒複習過) → 最該練
  const over=(Date.now()-s.due)/86400000;   // 逾期天數
  return over>=0 ? 3+Math.min(over,7) : 1;  // 到期/逾期權重高，未到期低
}

function regionMastered(ri){ return REGION_LIST[ri].filter(r=>vs(r[0]).m).length; }

/* 同一題至少間隔 8 題才再出現（題庫不足 8 時退而求其次，盡量不連續重複） */
let recent=[];
function notRecent(pool){
  if(pool.length<=1) return pool;
  const gap=Math.min(8, pool.length-1);
  const avoid=new Set(recent.slice(-gap));
  const cand=pool.filter(r=>!avoid.has(r[0]));
  return cand.length?cand:pool;
}
function pushRecent(v){ recent.push(v); if(recent.length>8) recent.shift(); }
function pickReview(){
  const pool=reviewPool(); if(!pool.length) return null;
  const weighted=[];
  notRecent(pool).forEach(r=>{ const s=rs(r[0]); const w=Math.max(1, Math.round(srsOverdueWeight(s)+s.w*2)); for(let k=0;k<w;k++) weighted.push(r); });
  return weighted.length ? weighted[Math.floor(Math.random()*weighted.length)] : pool[0];
}
function dueCount(){ return reviewPool().filter(r=>{ const s=rs(r[0]); return s.due && Date.now()>=s.due; }).length; }

function tone(freq,start,dur,type,vol){
  const a=audio(); if(!a||muted) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  const t=a.currentTime+start;

  g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.02);
}

/* ===== 語音（念三態）：優先自然女聲，避開難聽的 novelty 語音 ===== */
let chosenVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices(); if(!vs.length) return null;
  const prefer=["Samantha","Victoria","Allison","Ava","Susan","Karen","Moira","Tessa","Serena","Fiona","Zoe","Google US English","Microsoft Zira","Microsoft Aria"];
  for(const name of prefer){
    const v=vs.find(x=>/^en/i.test(x.lang)&&x.name===name) || vs.find(x=>/^en/i.test(x.lang)&&x.name.startsWith(name));
    if(v) return v;
  }
  const novelty=/(bells|bad news|good news|bahh|bubbles|cellos|organ|trinoids|whisper|wobble|zarvox|boing|jester|junior|ralph|albert|fred|superstar|rocko|shelley|grandma|grandpa|flo\b|eddy|reed|sandy|rishi|kathy)/i;
  return vs.find(x=>/en[-_]US/i.test(x.lang)&&!novelty.test(x.name)) || vs.find(x=>/^en/i.test(x.lang)) || null;
}
function getVoice(){ if(!chosenVoice) chosenVoice=pickVoice(); return chosenVoice; }
function speakThree(v){
  if(muted || !("speechSynthesis" in window)) return;
  const row=VERBS.find(r=>r[0]===v); if(!row) return;
  try{
    speechSynthesis.cancel();
    const vo=getVoice();
    // 三態各自不同音高與輕重，模擬中文二聲(高)–三聲(低)–四聲(慢而重沉)的韻律
    const parts=[
      {t:row[0], pitch:1.4,  rate:0.95, vol:1.0},  // 原形：上揚
      {t:row[1], pitch:0.8,  rate:0.92, vol:0.9},  // 過去式：壓低
      {t:row[2], pitch:1.1,  rate:0.72, vol:1.0}   // 過去分詞：放慢加重
    ];
    parts.forEach(p=>{
      const u=new SpeechSynthesisUtterance(p.t);
      u.lang="en-US"; if(vo){ u.voice=vo; u.lang=vo.lang; }
      u.pitch=p.pitch; u.rate=p.rate; u.volume=p.vol;
      speechSynthesis.speak(u);
    });
  }catch(e){}
}

/* ===== 干擾項：似真錯誤拼法產生器 ===== */
function regularize(v){
  if(/e$/.test(v)) return v+"d";
  if(/[^aeiou]y$/.test(v)) return v.slice(0,-1)+"ied";
  if(/^[a-z]*[aeiou][^aeiouwxy]$/.test(v)) return v+v.slice(-1)+"ed";
  return v+"ed";
}
function vowelSwaps(v){
  const m=v.match(/[aeiou](?=[^aeiou]*$)/); // 最後一個母音
  if(!m) return [];
  const i=m.index, out=[];
  ["a","o","u","e","i"].forEach(nv=>{ if(nv!==v[i]) out.push(v.slice(0,i)+nv+v.slice(i+1)); });
  return out;
}
function fakeIrregular(base){
  const head=(base.match(/^[^aeiou]*/)||[""])[0] || base[0];
  const out=[];
  ["o","u","a"].forEach(vw=>["de","ne","te","re","le"].forEach(t=>out.push(head+vw+t)));
  ["ought","ung","ank","unk","ew","ode","ore"].forEach(t=>out.push(head+t));
  return out;
}
function isLetters(s){ return /^[a-z]+$/.test(s); }
function generateDistractors(row, answerIdx){
  const base=row[0], answer=row[answerIdx];
  const otherForm = answerIdx===1 ? row[2] : row[1]; // 過去式題→拿 pp 當誘答；pp 題→拿過去式當誘答
  const banned=new Set([answer]);                    // 只禁正解本身（原形/另一態反而是好誘答）
  const out=[], set=new Set();
  const tryAdd=(val)=>{ if(!val) return; val=(""+val).toLowerCase(); if(val.length<2||!isLetters(val)) return; if(banned.has(val)||set.has(val)) return; set.add(val); out.push(val); };
  // 依優先序：原形/另一態(分辨三態) → 加 ed(最常犯) → 字幹母音變化 → 字尾變化 → 拼湊兜底
  const tiers=[
    [base, otherForm],                                                   // 真實的原形與另一態：考三態辨別
    [regularize(base), base+"ed"],                                       // 學生最常犯的「加 ed」
    [...vowelSwaps(base), ...vowelSwaps(answer)],                         // 保留字幹框架的母音變化
    [answer.replace(/e$/,"")+"en", answer+"en", base+"en", base+"t"],    // 字尾變化
    fakeIrregular(base),                                                  // 模仿不規則（兜底）
    shuffle(VERBS.map(r=>r[answerIdx]))                                   // 借真實同態（最終兜底）
  ];
  for(let i=0;i<tiers.length && out.length<3;i++){
    const items = i<3 ? shuffle(tiers[i]) : tiers[i];   // 前 3 層內部洗牌、層間保序
    for(const c of items){ if(out.length>=3) break; tryAdd(c); }
  }
  return out.slice(0,3);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function pickInRegion(ri){
  const region=REGION_LIST[ri];
  const unmastered=region.filter(r=>!vs(r[0]).m);

  // 排除最近出現過的字（間隔窗固定看區的大小，不隨剩餘字數縮水）
  const win=Math.min(6, region.length-1);

  // 尾段：沒精通的字剩 ≤3 個 → 補進「已精通」的字當間隔器，
  // 避免同一個還沒過的字連續轟炸（已精通字答錯不會掉精通，純穿插複習）
  if(unmastered.length<=3){
    const spacers=region.filter(r=>vs(r[0]).m && !recentSet.has(r[0]));
    const weighted=[];
    cand.forEach(r=>{ for(let k=0;k<3;k++) weighted.push(r); }); // 沒過的字權重高(主練)
    spacers.forEach(r=>weighted.push(r));                        // 過了的字低權重(間隔)
    if(weighted.length) return weighted[Math.floor(Math.random()*weighted.length)];
  }
  if(!cand.length) cand=unmastered; // 區太小、全被排除 → 退回（仍盡量不連續）
  return cand[Math.floor(Math.random()*cand.length)];
}
function nextQuestion(){
  if(regionDone(curRegion)){ renderClear(); return; }
  curRow=pickInRegion(curRegion);
  pushRecent(curRow[0]);
  ptOpts=shuffle([curRow[1], ...generateDistractors(curRow,1)]);
  ppOpts=shuffle([curRow[2], ...generateDistractors(curRow,2)]);
  ptPick=null; ppPick=null; graded=false;
  renderQuiz();
}

function pickOpt(btn){

function onSubmit(){
  if(graded){ nextQuestion(); return; }   // 第二次按 = 下一題
  readPicks();
  graded=true;
  const okPt=ptPick===curRow[1], okPp=ppPick===curRow[2], allOk=okPt&&okPp;
  const s=vs(curRow[0]);
  if(allOk){ s.c++; s.s++; if(s.s>=MASTER_STREAK) s.m=true; }
  else { s.w++; s.s=0; }
  logAnswer(allOk);
  saveDB();
  markGroup("pt", curRow[1]); markGroup("pp", curRow[2]);
  document.getElementById("mkPt").textContent=okPt?"✅":"❌";
  document.getElementById("mkPp").textContent=okPp?"✅":"❌";

  res.className="result "+(allOk?"ok":"no");

  res.innerHTML=msg+`<span class="three">${curRow[0]} – ${curRow[1]} – ${curRow[2]} <small>（${curRow[3]}）</small></span>`;

  const rt=document.querySelector(".rprog span:last-child"); if(rt) rt.textContent=`${m}/${n}`;

function markGroup(grp, correct){
  if(isType()){
    const ok = (grp==="pt"?ptPick:ppPick)===correct;
    markType(grp, correct, ok);

  app().querySelectorAll(`.opt[data-grp="${grp}"]`).forEach(b=>{
    b.disabled=true;
    if(b.dataset.v===correct) b.classList.add("correct");
    else if(b.classList.contains("sel")) b.classList.add("wrong");
  });
}

function enterSentence(){
  view="sentence"; curRegion=null; recent=[];

function nextSentence(){
  const pool=sentencePool();
  if(!pool.length){ app().innerHTML=`<div class="clear"><div class="big">📭</div><p>先去闖關解鎖一些動詞，才有例句可練！</p><div class="toolbar"><button id="toMapBtn">回地圖</button></div></div>`;

  const idx = sentForm==="past"?1:2;
